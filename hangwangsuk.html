    const EVENT = {

      venue:       "OO갤러리",

      { krw: 5000,  choco: "초콜릿 50개" },

      { krw: 20000, choco: "초콜릿 2박스" },

    ];

    // 색상
    const D = { // dark zone
      bg:      "#1C4A2E",

    const L = { // light zone

      red:     "#AA4040",
    };

    const fmt = (n) => Number(n||0).toLocaleString("ko-KR");

    const SESSION_ID = (() => {
      try {
        let id = sessionStorage.getItem("ulk-sid");
        if (!id) { id = crypto.randomUUID(); sessionStorage.setItem("ulk-sid", id); }
        return id;
      } catch { return crypto.randomUUID(); }
    })();

    const makeOrderId = () => "ulk-" + Date.now() + "-" + Math.random().toString(36).slice(2, 8);

    const track = (event, data = {}) => {
      fetch("/api/event", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ event, sessionId: SESSION_ID, data: { ...data, eventId: EVENT.id } }),
      }).catch(() => {});
    };

    function App() {
      const [config,      setConfig]      = useState(null);
      const [screen,      setScreen]      = useState("main");
      const [activeThumb, setActiveThumb] = useState(null);
      const [message,     setMessage]     = useState("");
      const [selected,    setSelected]    = useState(PRESETS[1]);
      const [customAmt,   setCustomAmt]   = useState("");
      const [isCustom,    setIsCustom]    = useState(false);
      const [anonymous,   setAnonymous]   = useState(false);
      const [paying,      setPaying]      = useState(false);
      const [errorMsg,    setErrorMsg]    = useState("");
      const [doneAmt,     setDoneAmt]     = useState(null);
      const tapCount = useRef(0);
      const tapTimer = useRef(null);
      const customRef = useRef(null);

      useEffect(() => {
        fetch("/api/config")
          .then(r => r.json())
          .then(d => { setConfig(d); track("page_enter", { mode: d.mode }); })
          .catch(() => { setConfig({ mode: "weroute" }); track("page_enter"); });
      }, []);

      const go = (to) => setScreen(to);

      const handleLogoTap = () => {
        clearTimeout(tapTimer.current);
        tapTimer.current = setTimeout(() => { tapCount.current = 0; }, 2000);
        tapCount.current += 1;
        if (tapCount.current >= 5) { tapCount.current = 0; go("admin"); }
      };

      const mode = config?.mode || "weroute";
      const configReady = !!config && (
        mode === "manual" ||
        (mode === "weroute" && !!config.mid) ||
        (mode !== "weroute" && mode !== "manual" && !!config.clientKey)
      );

      const customKrw = parseInt(customAmt || "0", 10);
      const activeKrw = isCustom ? customKrw : selected.krw;
      const customChoco = customKrw > 0 ? `초콜릿 ${customKrw / 100}개` : "";
      const activeLabel = isCustom ? `직접입력 ${fmt(customKrw)}원` : `${fmt(selected.krw)}원`;
      const activeChoco = isCustom ? customChoco : selected.choco;
      const canPay = configReady && (isCustom ? customKrw >= 1000 : true);

      // URL 파라미터로 결제 완료 감지 (위루트 Return URL → /success/hks?...)
      useEffect(() => {
        const q = new URLSearchParams(window.location.search);
        if (q.get("result_cd") === "0000" && q.get("is_cancel") !== "1") {
          setDoneAmt(parseInt(q.get("amount") || "0", 10));
          setScreen("done");
        }
      }, []);

      const handleSelectPreset = (p) => {
        setSelected(p); setIsCustom(false); setErrorMsg("");
        track("amount_select", { krw: p.krw });
        if (customRef.current) customRef.current.value = "";
        setCustomAmt("");
      };

      const handleCustomFocus = () => {
        setIsCustom(true); setErrorMsg("");
        track("custom_amount");
      };

      const handleCustomChange = (e) => {
        const val = e.target.value.replace(/\D/g, "");
        setCustomAmt(val);
        if (val) setIsCustom(true);
        else setIsCustom(false);
      };

      const handlePay = async () => {
        if (!canPay || paying) return;
        setErrorMsg(""); setPaying(true);
        track("pay_click", { amount: activeKrw, label: activeLabel, mode });

        if (mode === "manual") {
          try {
            const res = await fetch("/api/intent", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                amount: activeKrw, label: activeLabel, message,
                performanceId: EVENT.id, performanceName: EVENT.title,
              }),
            });
            const d = await res.json();
            if (d.success) { setDoneAmt(activeKrw); go("done"); }
            else setErrorMsg(d.message || "오류가 발생했습니다.");
          } catch { setErrorMsg("서버 연결에 실패했습니다."); }
          finally { setPaying(false); }

        } else if (mode === "weroute") {
          if (!config?.mid) {
            setErrorMsg("결제 준비 중입니다. 잠시 후 다시 시도해주세요.");
            setPaying(false); return;
          }
          const metaJson = JSON.stringify({
            sid:   SESSION_ID,
            label: activeLabel,
            msg:   (message || "").slice(0, 50),
            anon:  anonymous,
            pid:   EVENT.id,
            pname: EVENT.title.slice(0, 20),
          });
          const form = document.createElement("form");
          form.method = "POST";
          form.action = "https://api.weroutefincorp.com/v2/pay/auth";
          form.charset = "UTF-8";
          const fields = {
            pay_key:       "18580UivDGyqtvo9ALDK01MvdjEsr2hVol7VBFr9z5HVqgsTQfHnTdJMhRzHeOH3",
            mid:           config.mid, tid: "",
            amount:        String(activeKrw),
            ord_num:       makeOrderId(),
            item_name:     `울컥 · ${EVENT.artist} 개인전`,
            buyer_name:    anonymous ? "익명" : "응원자",
            buyer_phone:   "01000000000",
            is_send_email: "0", installment: "00", user_agent: "WM",
            return_url:    `${window.location.origin}/api/return/weroute`,
            temp:          metaJson,
          };
          Object.entries(fields).forEach(([k, v]) => {
            const inp = document.createElement("input");
            inp.type = "hidden"; inp.name = k; inp.value = v;
            form.appendChild(inp);
          });
          document.body.appendChild(form);
          form.submit();
        }
      };

      // ── 완료 화면 ──────────────────────────────────────────────────────────
      if (screen === "done") {
        return (
          <div style={{ minHeight: "100vh", backgroundColor: D.bg, display: "flex", justifyContent: "center", fontFamily: FONT }}>
            <div style={{ width: "100%", maxWidth: "420px", minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "40px 24px", textAlign: "center" }}>
              <div style={{ width: "90px", height: "90px", borderRadius: "50%", overflow: "hidden", marginBottom: "24px", border: `2px solid ${D.green}` }}>
                <img src={ARTWORK} alt="" style={{ width: "100%", height: "100%", objectFit: "cover", objectPosition: "center 35%" }} />
              </div>
              <h2 style={{ fontSize: "20px", fontWeight: 700, color: D.text, letterSpacing: "-0.02em", marginBottom: "10px", lineHeight: 1.5 }}>
                {EVENT.artist} 작가에게<br/>마음이 전달됩니다
              </h2>
              <p style={{ fontSize: "18px", color: D.accent, fontWeight: 700, marginBottom: "8px" }}>{fmt(doneAmt || activeKrw)}원</p>
              {message && <p style={{ fontSize: "14px", color: D.muted, lineHeight: 1.8, marginBottom: "6px", fontStyle: "italic" }}>"{message}"</p>}
              <p style={{ fontSize: "13px", color: D.hint, marginBottom: "32px" }}>감사합니다.</p>
              <div style={{ width: "100%", padding: "18px 20px", backgroundColor: "rgba(255,255,255,0.06)", borderRadius: "14px", border: `1px solid ${D.border}`, marginBottom: "28px" }}>
                <p style={{ fontSize: "13px", color: D.muted, lineHeight: 1.9 }}>
                  보내주신 마음은 작가에게 전달됩니다.<br/>당신의 응원이 다음 작품을 만듭니다.
                </p>
              </div>
              <button onClick={() => { go("main"); setDoneAmt(null); }}
                style={{ width: "100%", padding: "15px", backgroundColor: "transparent", border: `1.5px solid rgba(255,255,255,0.2)`, borderRadius: "12px", fontSize: "14px", fontWeight: 500, color: D.muted, fontFamily: FONT, cursor: "pointer" }}>
                처음으로 돌아가기
              </button>
              <div style={{ marginTop: "48px" }} onClick={handleLogoTap}>
                <span style={{ fontSize: "11px", color: D.hint, letterSpacing: "0.1em" }}>♡ ULK · PAY</span>
              </div>
            </div>
          </div>
        );
      }

      if (screen === "admin") {
        return <div style={{ minHeight: "100vh", backgroundColor: "#0C0A07", display: "flex", justifyContent: "center", alignItems: "center", fontFamily: FONT }}>
          <div style={{ color: "#EFE7DA", fontSize: "14px", textAlign: "center", padding: "20px" }}>관리자 패널은<br/>ulkpay.onrender.com/admin 에서 접속해주세요.</div>
        </div>;
      }

      // ── 메인 화면 ──────────────────────────────────────────────────────────
      return (
        <div style={{ minHeight: "100vh", fontFamily: FONT }}>
          <div style={{ maxWidth: "420px", margin: "0 auto" }}>

            {/* ── 다크존: 감정 구간 ── */}
            <div style={{ backgroundColor: D.bg, paddingBottom: "0", position: "relative" }}>

              {/* 헤더 작품 이미지 */}
              <div style={{ position: "relative", width: "100%", height: "260px", overflow: "hidden" }}>
                <img src={ARTWORK} alt="한광숙 작품" style={{ width: "100%", height: "100%", objectFit: "cover", objectPosition: "center 35%", display: "block" }} />
                <div style={{ position: "absolute", inset: 0, background: `linear-gradient(to bottom, rgba(0,0,0,0.08) 0%, transparent 30%, ${D.bg} 100%)` }} />
                <div onClick={handleLogoTap} style={{ position: "absolute", top: "14px", right: "16px", fontSize: "11px", color: "rgba(255,255,255,0.75)", letterSpacing: "0.12em" }}>♡ ULK</div>
              </div>

              {/* 전시 정보 */}
              <div style={{ padding: "0 20px", marginTop: "-8px", marginBottom: "28px", position: "relative", zIndex: 1 }}>
                <div style={{ fontSize: "11px", color: D.hint, letterSpacing: "0.13em", marginBottom: "8px" }}>{EVENT.dateStart} – {EVENT.dateEnd} · {EVENT.venue}</div>
                <h1 style={{ fontSize: "21px", fontWeight: 700, color: D.text, letterSpacing: "-0.02em", lineHeight: 1.3, marginBottom: "4px" }}>{EVENT.title}</h1>
                <p style={{ fontSize: "14px", color: D.muted }}>{EVENT.subtitle}</p>
              </div>

              {/* 썸네일 */}
              <div style={{ padding: "0 20px", marginBottom: "20px" }}>
                <div style={{ fontSize: "12px", color: D.hint, letterSpacing: "0.06em", marginBottom: "10px" }}>오늘 만난 작품들</div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: "6px" }}>
                  {THUMBS.map((t, i) => {
                    const isActive = activeThumb === i;
                    return (
                      <div key={i}
                        onClick={() => setActiveThumb(isActive ? null : i)}
                        style={{
                          borderRadius: "8px", overflow: "hidden", cursor: "pointer",
                          position: "relative", transition: "all 0.25s",
                          gridColumn: isActive ? "span 2" : "span 1",
                          gridRow:    isActive ? "span 2" : "span 1",
                        }}>
                        <img src={t.src} alt={t.name} style={{ width: "100%", aspectRatio: "1/1", objectFit: "cover", display: "block" }} />
                        {isActive && (
                          <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, padding: "8px 10px", background: "linear-gradient(to top, rgba(0,0,0,0.65), transparent)", color: "#fff", fontSize: "12px", fontWeight: 600, borderRadius: "0 0 8px 8px" }}>
                            {t.name}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* 감정 질문 */}
              <div style={{ margin: "0 20px 20px", padding: "18px 20px", backgroundColor: D.card, borderRadius: "14px", border: `1px solid ${D.border}` }}>
                <p style={{ fontSize: "15px", color: D.text, lineHeight: 1.75 }}>
                  오늘 <span style={{ fontWeight: 700, color: D.accent }}>가장 오래 머문 작품</span>을<br/>떠올려 보세요.
                </p>
              </div>

              {/* 작가 한마디 */}
              <div style={{ margin: "0 20px", padding: "18px 20px", backgroundColor: D.card, borderRadius: "14px", borderLeft: `3px solid ${D.green}` }}>
                <p style={{ fontSize: "14px", color: "#C0DDCA", lineHeight: 1.9, marginBottom: "10px", whiteSpace: "pre-line" }}>{EVENT.artistQuote}</p>
                <p style={{ fontSize: "12px", color: D.hint }}>— {EVENT.artist} 작가</p>
              </div>

              {/* 그라데이션 전환 */}
              <div style={{ height: "80px", background: `linear-gradient(to bottom, ${D.bg}, #F6F8F5)` }} />
            </div>

            {/* ── 라이트존: 행동 구간 ── */}
            <div style={{ backgroundColor: L.bg }}>

              {/* 마음 전하기 */}
              <div style={{ padding: "0 20px 24px" }}>
                <h2 style={{ fontSize: "19px", fontWeight: 700, color: L.text, letterSpacing: "-0.02em", marginBottom: "8px" }}>작가에게 마음을 전하세요</h2>
                <p style={{ fontSize: "14px", color: L.muted, lineHeight: 1.8 }}>당신의 응원이 다음 작품을 만듭니다.</p>
              </div>

              <div style={{ height: "1px", backgroundColor: L.border, margin: "0 20px 24px" }} />

              {/* 메시지 먼저 */}
              <div style={{ padding: "0 20px", marginBottom: "32px" }}>
                <div style={{ fontSize: "13px", fontWeight: 600, color: L.accent, letterSpacing: "0.06em", marginBottom: "14px" }}>한 마디 남겨주세요</div>
                <div style={{ display: "flex", flexDirection: "column", gap: "7px", marginBottom: "10px" }}>
                  {EVENT.quickMsgs.map((m) => {
                    const on = message === m;
                    return (
                      <button key={m}
                        onClick={() => { setMessage(on ? "" : m); if (!on) track("message_select", { message: m }); }}
                        style={{ backgroundColor: on ? L.accentF : L.card, border: `1px solid ${on ? L.accent : L.border}`, borderRadius: "10px", color: on ? L.accent : L.muted, fontSize: "14px", fontFamily: FONT, padding: "12px 14px", cursor: "pointer", transition: "all 0.15s", textAlign: "left" }}>
                        {m}
                      </button>
                    );
                  })}
                </div>
                <textarea value={message} onChange={(e) => setMessage(e.target.value.slice(0, 200))} onFocus={() => track("message_type")}
                  placeholder="작가에게 전하고 싶은 마음을 적어주세요."
                  style={{ width: "100%", height: "80px", backgroundColor: L.card, border: `1px solid ${L.border}`, borderRadius: "12px", color: L.text, fontSize: "14px", fontFamily: FONT, lineHeight: 1.7, padding: "12px 15px", resize: "none", outline: "none", marginBottom: "4px" }} />
                <div style={{ textAlign: "right", fontSize: "11px", color: L.hint }}>{message.length} / 200</div>
              </div>

              {/* 금액 선택 */}
              <div style={{ padding: "0 20px", marginBottom: "24px" }}>
                <div style={{ fontSize: "13px", fontWeight: 600, color: L.accent, letterSpacing: "0.06em", marginBottom: "6px" }}>마음을 담아</div>
                <div style={{ fontSize: "14px", color: L.muted, marginBottom: "14px" }}>🍫 초콜릿 1개 = 100원</div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "8px", marginBottom: "12px" }}>
                  {PRESETS.map((p) => {
                    const on = !isCustom && selected.krw === p.krw;
                    return (
                      <div key={p.krw} onClick={() => handleSelectPreset(p)}
                        style={{ padding: "14px 16px", border: `1.5px solid ${on ? L.accent : L.border}`, borderRadius: "12px", backgroundColor: on ? L.accentF : L.card, cursor: "pointer", transition: "all 0.15s", position: "relative", textAlign: "center" }}>
                        {p.recommended && <div style={{ position: "absolute", top: "-1px", right: "-1px", backgroundColor: L.accent, color: "#FFF", fontSize: "9px", fontWeight: 700, padding: "2px 8px", borderRadius: "0 11px 0 6px" }}>인기</div>}
                        <div style={{ fontSize: "20px", fontWeight: 700, color: on ? L.accent : L.text, letterSpacing: "-0.02em" }}>{fmt(p.krw)}원</div>
                        <div style={{ fontSize: "13px", color: L.muted, marginTop: "3px" }}>{p.choco}</div>
                      </div>
                    );
                  })}
                </div>

                {/* 직접 입력 - 항상 노출 */}
                <div style={{ backgroundColor: L.card, border: `1.5px solid ${isCustom ? L.accent : L.border}`, borderRadius: "12px", padding: "12px 16px", transition: "border-color 0.15s" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
                    <span style={{ fontSize: "20px", fontWeight: 600, color: L.hint, flexShrink: 0 }}>₩</span>
                    <input ref={customRef} type="number" inputMode="numeric"
                      placeholder="원하시는 마음을 직접 입력하세요"
                      value={customAmt}
                      onFocus={handleCustomFocus}
                      onChange={handleCustomChange}
                      style={{ flex: 1, minWidth: 0, backgroundColor: "transparent", border: "none", borderBottom: `2px solid ${isCustom ? L.accent : L.border}`, color: L.text, fontSize: isCustom ? "22px" : "12px", fontFamily: FONT, fontWeight: isCustom ? 700 : 400, padding: "4px 0", outline: "none", transition: "all 0.15s" }} />
                    <span style={{ fontSize: "16px", color: L.muted, flexShrink: 0 }}>원</span>
                  </div>
                  {isCustom && customKrw >= 100 && (
                    <div style={{ fontSize: "13px", color: L.muted, marginTop: "6px" }}>{customChoco}</div>
                  )}
                </div>
              </div>

              {/* 익명 */}
              <div onClick={() => setAnonymous(!anonymous)}
                style={{ display: "flex", alignItems: "center", gap: "10px", margin: "0 20px 24px", cursor: "pointer", userSelect: "none" }}>
                <div style={{ width: "18px", height: "18px", borderRadius: "4px", border: `1.5px solid ${anonymous ? L.accent : L.border}`, backgroundColor: anonymous ? L.accent : "transparent", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, transition: "all 0.15s" }}>
                  {anonymous && <span style={{ color: "#FFF", fontSize: "11px", fontWeight: 700 }}>✓</span>}
                </div>
                <span style={{ fontSize: "14px", color: L.muted }}>익명으로 보내기</span>
              </div>

              {/* 선택 요약 */}
              {canPay && (
                <div style={{ margin: "0 20px 16px", backgroundColor: L.cardSoft, border: `1px solid ${L.border}`, borderRadius: "12px", padding: "14px 18px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div>
                    <div style={{ fontSize: "12px", color: L.hint, marginBottom: "2px" }}>{anonymous ? "익명으로" : "이름 없이"} 전달</div>
                    <div style={{ fontSize: "13px", color: L.muted }}>{activeLabel} · {activeChoco}</div>
                  </div>
                  <div style={{ fontSize: "21px", fontWeight: 700, color: L.accent, letterSpacing: "-0.02em" }}>{fmt(activeKrw)}원</div>
                </div>
              )}

              {/* 에러 */}
              {errorMsg && (
                <div style={{ margin: "0 20px 14px", backgroundColor: "#FDF2F2", border: "1px solid #E0B0B0", borderRadius: "10px", padding: "12px 14px" }}>
                  <p style={{ fontSize: "14px", color: L.red, lineHeight: 1.6 }}>{errorMsg}</p>
                </div>
              )}

              {/* 결제 버튼 */}
              <div style={{ padding: "0 20px 20px" }}>
                <button onClick={handlePay} disabled={!canPay || paying}
                  style={{ width: "100%", padding: "18px 24px", backgroundColor: (canPay && !paying) ? L.accent : L.border, color: (canPay && !paying) ? "#FFFFFF" : L.hint, border: "none", borderRadius: "14px", fontSize: "16px", fontWeight: 700, fontFamily: FONT, cursor: (canPay && !paying) ? "pointer" : "default", letterSpacing: "-0.01em", transition: "all 0.2s", opacity: (!configReady || paying) ? 0.6 : 1 }}>
                  {paying ? "전달 중..." : !configReady ? "준비 중..." : !canPay ? "금액을 선택해주세요" : "한광숙 작가에게 전하기"}
                </button>
                <p style={{ fontSize: "12px", color: L.hint, textAlign: "center", marginTop: "14px", lineHeight: 1.8 }}>보내주신 마음은 작가에게 전달됩니다.</p>
              </div>

              {/* 푸터 */}
              <div style={{ textAlign: "center", padding: "32px 20px 48px" }} onClick={handleLogoTap}>
                <span style={{ fontSize: "11px", color: L.hint, letterSpacing: "0.1em" }}>♡ ULK · PAY</span>
                <p style={{ fontSize: "11px", color: L.hint, marginTop: "4px" }}>마음을 전하는 새로운 방법</p>
              </div>

            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
